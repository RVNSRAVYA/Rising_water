{% extends "base.html" %}

{% block title %}Rising Waters - Page Not Found (404){% endblock %}

{% block content %}
<section class="py-5 my-5 text-center animate-fade-in-up">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="d-inline-flex p-4 bg-primary-light text-primary rounded-circle mb-4">
                    <i class="bi bi-compass-fill" style="font-size: 4rem;"></i>
                </div>
                <h1 class="hero-title text-primary fw-extrabold mb-2" style="font-size: 5rem;">404</h1>
                <h3 class="font-heading fw-bold mb-3 text-uppercase">Page Not Found</h3>
                <p class="text-muted mb-4">The route you requested does not exist or may have been moved. Let's get you back to safety.</p>
                <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
                    <i class="bi bi-house-door-fill me-2"></i>Return Home
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
